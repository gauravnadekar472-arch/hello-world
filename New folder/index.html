<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="shortcut icon" href="Quron.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>QURON</title>
  <link rel="stylesheet" href="index.css" />
</head>

<body>

<header class="top-bar">
<button id="menuBtn">
  <span></span>
  <span></span>
  <span></span>
</button>
  <h1 class="glow">QURON</h1>
<button id="profileBtn">
  <img src="https://cdn-icons-png.flaticon.com/512/4140/4140061.png" alt="profile" >
</button>
</header>

<!-- Side Drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-logo">
    <img src="Quron.png" alt="Eagle AI Logo">
    <h2>QURON</h2>
  </div>

  <button class="new-chat" id="newChat">＋ New Chat</button>
  <input type="text" id="searchChats" placeholder="Search chats" />
  <ul id="chatHistory"></ul>

</div>


<main class="chat-area" id="chatArea">

  <!-- EMPTY STATE INSIDE -->
  <div id="emptyState" class="empty-state"></div>

</main>
<!-- NOTE: Thinking animation will be created dynamically by JS, so no static div here -->


<!-- Input Bar -->
<div class="input-bar">

  <!-- Attach Button -->
  <button id="attachBtn">
    <svg viewBox="0 0 24 24" class="plus-icon">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>

  <!-- 🔥 FILE INPUTS (ALAG, SVG ke andar nahi) -->
  <input type="file" id="fileInput" accept="*/*" style="display:none">
  <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

  <!-- Voice -->
  <button id="voiceBtn">
    <svg viewBox="0 0 24 24" class="mic-icon">
      <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11h-2z"/>
    </svg>
  </button>

  <input type="text" id="userInput" placeholder="Message Eagle-AI…" />
  <button id="sendBtn">➤</button>

</div>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script src="index.js"></script>
</body>
</html>
