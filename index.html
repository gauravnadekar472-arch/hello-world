<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="shortcut icon" href="eaglelogo.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Eagle-AI</title>
  <link rel="stylesheet" href="index.css" />
</head>

<body>

<header class="top-bar">
  <button id="menuBtn">☰</button>
  <h1 class="glow">EAGLE-AI</h1>
  <button id="profileBtn">👤</button>
</header>

<!-- Side Drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-logo">
    <img src="eaglelogo.png" alt="Eagle AI Logo">
    <h2>EAGLE-AI</h2>
  </div>

  <button class="new-chat" id="newChat">＋ New Chat</button>
  <input type="text" id="searchChats" placeholder="Search chats" />
  <ul id="chatHistory"></ul>

</div>

<!-- Chat Area -->
<main class="chat-area" id="chatArea">
  <!-- NOTE: Thinking animation will be created dynamically by JS, so no static div here -->
</main>

<!-- Input Bar -->
<div class="input-bar">
  <button id="attachBtn">＋</button>
  <button id="voiceBtn">🎙️</button>
  <input type="text" id="userInput" placeholder="Message Eagle-AI…" />
  <button id="sendBtn">➤</button>
</div>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script src="index.js"></script>
</body>
</html>
